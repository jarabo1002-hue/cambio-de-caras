services:
  - type: web
    name: face-swap-ethical-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      npm install --production
      python download_model.py
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: uploads-disk
      mountPath: /app/uploads
      sizeGB: 1
    disk:
      name: results-disk
      mountPath: /app/results
      sizeGB: 1
